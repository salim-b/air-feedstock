context:
  version: "0.9.0"

package:
  name: air
  version: ${{ version }}

source:
  url: https://github.com/posit-dev/air/archive/refs/tags/${{ version }}.tar.gz
  sha256: 55cae527153badeb348b7b04ffb3c9f1d9f20e27e388edeae694a05a5e32f289

build:
  number: 1
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --no-track --locked --bins --all-features --root ${{ PREFIX }} --path crates/air
          # generate shell completions
          - mkdir -p $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d $PREFIX/share/zsh/site-functions
          - $PREFIX/bin/air generate-shell-completion bash > $PREFIX/share/bash-completion/completions/air
          - $PREFIX/bin/air generate-shell-completion fish > $PREFIX/share/fish/vendor_completions.d/air.fish
          - $PREFIX/bin/air generate-shell-completion zsh > $PREFIX/share/zsh/site-functions/_air
      - if: win
        then:
          - set CARGO_HOME=C:\.cargo # work around cargo/libgit2 Windows MAX_PATH (260 char) limitation, cf. https://github.com/libgit2/libgit2/blob/main/docs/win32-longpaths.md
          - cargo auditable install --no-track --locked --bins --all-features --root %LIBRARY_PREFIX% --path crates/air
          # generate shell completions
          - mkdir %LIBRARY_PREFIX%\share\bash-completion\completions
          - mkdir %LIBRARY_PREFIX%\share\fish\vendor_completions.d
          - mkdir %LIBRARY_PREFIX%\share\zsh\site-functions
          - '%LIBRARY_BIN%\air.exe generate-shell-completion bash > %LIBRARY_PREFIX%\share\bash-completion\completions\air'
          - '%LIBRARY_BIN%\air.exe generate-shell-completion fish > %LIBRARY_PREFIX%\share\fish\vendor_completions.d\air.fish'
          - '%LIBRARY_BIN%\air.exe generate-shell-completion zsh > %LIBRARY_PREFIX%\share\zsh\site-functions\_air'
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - air --help
      - air --version
  - package_contents:
      bin:
        - air
      files:
        - if: unix
          then:
            - share/bash-completion/completions/air
            - share/fish/vendor_completions.d/air.fish
            - share/zsh/site-functions/_air
        - if: win
          then:
            - Library/share/bash-completion/completions/air
            - Library/share/fish/vendor_completions.d/air.fish
            - Library/share/zsh/site-functions/_air
      strict: true

about:
  homepage: https://posit-dev.github.io/air/
  repository: https://github.com/posit-dev/air
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: An R formatter and language server
  description: |
    Air is an R formatter and language server, written in Rust.

extra:
  recipe-maintainers:
    - salim-b
